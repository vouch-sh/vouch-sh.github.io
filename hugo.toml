baseURL = "https://vouch.sh/"
title = "Vouch — Hardware-Backed Developer Credentials"
enableGitInfo = true
defaultContentLanguage = "en"

[languages]
  [languages.en]
    label = "English"
    locale = "en-US"
    weight = 1

[params]
  description = "Open-source credential broker that issues short-lived SSH, AWS, GitHub, and Kubernetes credentials after FIDO2 hardware verification. One YubiKey tap, 8 hours of access."
  ogImage = "/img/og-image.png"
  githubRepo = "https://github.com/vouch-sh/vouch"
  usInstance = "us.vouch.sh"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "monokai"
  lineNos = false
  guessSyntax = true

[outputFormats.llmstxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.llmsfull]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[outputFormats.markdown]
  mediaType = "text/markdown"
  isPlainText = true
  notAlternative = true

[mediaTypes."text/markdown"]
  suffixes = ["md"]

[outputs]
  home = ["HTML", "RSS", "llmstxt", "llmsfull"]
  page = ["HTML", "markdown"]
  section = ["HTML", "RSS"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

# Sidebar group labels are translated via i18n keys: sidebar_group_<key>
[[params.sidebarGroups]]
  key = "aws"

[[params.sidebarGroups]]
  key = "integrations"

[[params.sidebarGroups]]
  key = "admin"

[[params.sidebarGroups]]
  key = "reference"

# Menu names are translated via i18n keys referenced by `identifier`.
[[menus.main]]
  identifier = "nav_docs"
  name = "Docs"
  url = "/docs/"
  weight = 1

[[menus.main]]
  identifier = "nav_blog"
  name = "Blog"
  url = "/blog/"
  weight = 2

[[menus.main]]
  identifier = "nav_about"
  name = "About"
  url = "/about/"
  weight = 3

[[menus.main]]
  identifier = "nav_compare"
  name = "Compare"
  url = "/compare/"
  weight = 4

[[menus.main]]
  identifier = "nav_github"
  name = "GitHub"
  url = "https://github.com/vouch-sh/vouch"
  weight = 5
  [menus.main.params]
    external = true
