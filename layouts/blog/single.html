{{ define "main" }}
<article class="blog-single">
  <h1>{{ .Title }}</h1>
  <div class="meta">
    {{ with .Params.author }}{{ i18n "blog_by" }} {{ . }} &middot; {{ end }}
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format (i18n "date_format") }}</time>
    &middot; {{ math.Round (div (countwords .Content) 200.0) }} {{ i18n "blog_min_read" }}
  </div>
  {{ .Content }}
</article>
{{ end }}
